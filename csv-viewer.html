<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSV Analyst Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0f0e0c;
    --paper: #f5f2eb;
    --accent: #c8410b;
    --accent2: #2a5c45;
    --rule: #d4cfc5;
    --muted: #8a857c;
    --mono: 'DM Mono', monospace;
    --serif: 'Fraunces', Georgia, serif;
    --top10: #fff0e0;
    --top10-border: #e07a30;
    --top10-text: #a33500;
    --avg-bg: #eaf3ee;
    --avg-text: #1e4a32;
  }

  body { background: var(--paper); color: var(--ink); font-family: var(--mono); font-size: 13px; min-height: 100vh; }

  .topbar {
    display: flex; align-items: baseline; gap: 20px;
    padding: 20px 28px 16px; border-bottom: 2px solid var(--ink); flex-wrap: wrap;
  }
  .topbar-title { font-family: var(--serif); font-size: 22px; font-weight: 600; letter-spacing: -0.5px; color: var(--accent); white-space: nowrap; }
  .topbar-sub { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .topbar-right { margin-left: auto; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  input[type="text"], select {
    background: white; border: 1.5px solid var(--rule); border-radius: 3px;
    padding: 5px 10px; font-family: var(--mono); font-size: 12px; color: var(--ink);
    outline: none; transition: border-color 0.15s;
  }
  input[type="text"]:focus, select:focus { border-color: var(--accent); }
  input[type="text"] { width: 200px; }

  .badge { background: var(--ink); color: var(--paper); font-size: 11px; padding: 3px 9px; border-radius: 2px; font-family: var(--mono); }
  .badge.green { background: var(--accent2); }

  #dropzone {
    margin: 40px auto; max-width: 560px; border: 2.5px dashed var(--rule);
    border-radius: 6px; padding: 60px 40px; text-align: center; cursor: pointer;
    transition: border-color 0.2s, background 0.2s; position: relative;
  }
  #dropzone.drag-over { border-color: var(--accent); background: rgba(200,65,11,0.04); }
  #dropzone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .drop-icon { font-size: 40px; margin-bottom: 14px; display: block; }
  .drop-title { font-family: var(--serif); font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .drop-sub { color: var(--muted); font-size: 12px; margin-bottom: 18px; }
  .btn {
    display: inline-block; background: var(--accent); color: white; font-family: var(--mono);
    font-size: 12px; padding: 7px 18px; border-radius: 3px; border: none; cursor: pointer;
    text-transform: uppercase; letter-spacing: 0.06em; transition: background 0.15s;
  }
  .btn:hover { background: #a5340a; }
  .btn.secondary { background: transparent; color: var(--ink); border: 1.5px solid var(--rule); }
  .btn.secondary:hover { border-color: var(--ink); }

  #statsbar { display: none; padding: 10px 28px; background: white; border-bottom: 1px solid var(--rule); gap: 24px; align-items: center; flex-wrap: wrap; }
  .stat { display: flex; flex-direction: column; gap: 1px; }
  .stat-val { font-size: 16px; font-weight: 500; font-family: var(--serif); }
  .stat-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }

  #legend {
    display: none; padding: 8px 28px; gap: 20px; align-items: center;
    background: var(--paper); border-bottom: 1px solid var(--rule); flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--muted); }
  .legend-swatch { width: 14px; height: 14px; border-radius: 2px; flex-shrink: 0; }
  .swatch-top10 { background: var(--top10); border: 1.5px solid var(--top10-border); }
  .swatch-avg { background: var(--avg-bg); border: 1.5px solid var(--accent2); }

  #table-section { display: none; padding: 0 0 40px; }

  .table-controls {
    display: flex; gap: 10px; padding: 14px 28px; align-items: center; flex-wrap: wrap;
    border-bottom: 1px solid var(--rule);
  }

  .avg-sort-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--avg-bg); border: 1.5px solid var(--accent2);
    border-radius: 3px; padding: 5px 12px; font-size: 11px; color: var(--avg-text);
  }
  .avg-sort-box select {
    background: transparent; border: none; border-bottom: 1px dashed var(--accent2);
    font-size: 11px; color: var(--avg-text); padding: 1px 4px; border-radius: 0; font-weight: 500;
  }
  .avg-sort-box select:focus { border-color: var(--accent2); }

  .col-count { margin-left: auto; font-size: 11px; color: var(--muted); }

  .table-wrap { overflow: auto; max-height: 60vh; position: relative; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead { position: sticky; top: 0; z-index: 2; background: var(--ink); color: var(--paper); }
  thead th {
    padding: 9px 14px; text-align: left; font-weight: 500; white-space: nowrap;
    cursor: pointer; user-select: none; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.06em; border-right: 1px solid rgba(255,255,255,0.1); transition: background 0.12s;
  }
  thead th:hover { background: #2a2824; }
  .sort-arrow { margin-left: 5px; opacity: 0.4; font-size: 10px; }
  thead th.asc .sort-arrow::after { content: '▲'; opacity: 1; }
  thead th.desc .sort-arrow::after { content: '▼'; opacity: 1; }
  thead th:not(.asc):not(.desc) .sort-arrow::after { content: '↕'; }

  tr.avg-row td {
    background: var(--avg-bg) !important; color: var(--avg-text); font-weight: 500;
    border-top: 2px solid var(--accent2); border-bottom: 2px solid var(--accent2); font-size: 11px;
  }
  tr.avg-row td:first-child::before { content: 'AVG → '; font-size: 10px; opacity: 0.7; }

  tbody tr.top10 td { background: var(--top10) !important; }
  tbody tr.top10 td.numeric { color: var(--top10-text); font-weight: 600; }
  tbody tr.top10 td.rank-badge::before {
    content: attr(data-rank); display: inline-block; background: var(--top10-border);
    color: white; font-size: 9px; padding: 1px 5px; border-radius: 2px; margin-right: 6px; font-weight: 600;
  }

  tbody tr { border-bottom: 1px solid var(--rule); transition: background 0.1s; }
  tbody tr:not(.top10):not(.avg-row):hover { background: rgba(200,65,11,0.03); }
  tbody tr:not(.top10):not(.avg-row):nth-child(even) { background: rgba(0,0,0,0.02); }
  tbody td {
    padding: 7px 14px; white-space: nowrap; max-width: 260px;
    overflow: hidden; text-overflow: ellipsis; border-right: 1px solid var(--rule);
  }
  tbody td.numeric { text-align: right; color: var(--accent2); font-weight: 500; }

  #pagination { display: none; justify-content: center; align-items: center; gap: 8px; padding: 18px; }
  .page-btn {
    width: 32px; height: 32px; border: 1.5px solid var(--rule); background: white;
    border-radius: 3px; font-family: var(--mono); font-size: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.12s;
  }
  .page-btn:hover { border-color: var(--ink); }
  .page-btn.active { background: var(--ink); color: white; border-color: var(--ink); }
  .page-info { font-size: 11px; color: var(--muted); padding: 0 10px; }

  .msg { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }
  #no-data { display: none; }
  #reset-btn { display: none; }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">CSV Viewer</span>
  <span class="topbar-sub">Analyst Edition</span>
  <div class="topbar-right">
    <button class="btn secondary" id="reset-btn" onclick="resetAll()">↩ Load new file</button>
    <span class="badge green" id="file-badge" style="display:none"></span>
  </div>
</div>

<div id="statsbar">
  <div class="stat"><span class="stat-val" id="s-rows">–</span><span class="stat-lbl">Rows</span></div>
  <div class="stat"><span class="stat-val" id="s-cols">–</span><span class="stat-lbl">Columns</span></div>
  <div class="stat"><span class="stat-val" id="s-showing">–</span><span class="stat-lbl">Showing</span></div>
  <div class="stat"><span class="stat-val" id="s-name">–</span><span class="stat-lbl">File</span></div>
</div>

<div id="legend">
  <span style="font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Legend</span>
  <div class="legend-item"><span class="legend-swatch swatch-top10"></span>Top 10 in selected column</div>
  <div class="legend-item"><span class="legend-swatch swatch-avg"></span>Column average</div>
</div>

<div id="dropzone">
  <input type="file" accept=".csv" id="fileInput" onchange="handleFile(this.files[0])">
  <span class="drop-icon">📊</span>
  <div class="drop-title">Drop your CSV here</div>
  <div class="drop-sub">or click to browse — any size, any columns</div>
  <label class="btn" for="fileInput">Choose File</label>
</div>

<div id="table-section">
  <div class="table-controls">
    <input type="text" id="searchInput" placeholder="Search all columns…" oninput="applyFilters()">
    <select id="colFilter" onchange="applyFilters()"><option value="">Filter column…</option></select>
    <input type="text" id="colSearch" placeholder="Value…" oninput="applyFilters()" style="width:130px">
    <div class="avg-sort-box">
      ⌀ Sort by avg of
      <select id="avgColSelect" onchange="sortByAvgCol()">
        <option value="">— pick column —</option>
      </select>
      &amp; highlight top 10
    </div>
    <span class="col-count" id="match-count"></span>
  </div>
  <div class="table-wrap">
    <table id="dataTable">
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="msg" id="no-data">No matching rows.</div>
  </div>
  <div id="pagination"></div>
</div>

<script>
let allRows = [], headers = [], filtered = [], sortCol = -1, sortDir = 1;
let currentPage = 1;
const PAGE_SIZE = 50;
let avgColIdx = -1;
let top10Indices = new Set();
let colAverages = {};

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => parseCSV(e.target.result, file.name);
  reader.readAsText(file);
}

function parseCSV(text, name) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return alert('CSV appears empty.');
  const sample = lines[0];
  const delim = [',', '\t', ';', '|'].reduce((best, d) =>
    sample.split(d).length > sample.split(best).length ? d : best, ',');

  const parse = line => {
    const cols = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; continue; }
      if (c === delim && !inQ) { cols.push(cur.trim()); cur = ''; continue; }
      cur += c;
    }
    cols.push(cur.trim());
    return cols;
  };

  headers = parse(lines[0]);
  allRows = lines.slice(1).map(parse).filter(r => r.some(c => c !== ''));
  filtered = [...allRows];
  sortCol = -1; sortDir = 1; currentPage = 1; avgColIdx = -1;
  top10Indices = new Set(); colAverages = {};

  computeAllAverages();

  document.getElementById('dropzone').style.display = 'none';
  document.getElementById('table-section').style.display = 'block';
  document.getElementById('statsbar').style.display = 'flex';
  document.getElementById('legend').style.display = 'flex';
  document.getElementById('reset-btn').style.display = 'inline-block';
  const badge = document.getElementById('file-badge');
  badge.textContent = name; badge.style.display = 'inline-block';

  document.getElementById('s-rows').textContent = allRows.length.toLocaleString();
  document.getElementById('s-cols').textContent = headers.length;
  document.getElementById('s-name').textContent = name.length > 20 ? name.slice(0,18)+'…' : name;

  const colFilterSel = document.getElementById('colFilter');
  colFilterSel.innerHTML = '<option value="">Filter column…</option>' +
    headers.map((h,i) => `<option value="${i}">${h}</option>`).join('');

  const avgSel = document.getElementById('avgColSelect');
  avgSel.innerHTML = '<option value="">— pick column —</option>' +
    headers.map((h,i) => isNumericColAll(i) ? `<option value="${i}">${h}</option>` : '').join('');

  buildHeader();
  renderTable();
}

function isNumericColAll(idx) {
  return allRows.slice(0,30).filter(r => r[idx] !== undefined && r[idx] !== '')
    .every(r => !isNaN(parseFloat(r[idx].replace(/[$,%]/g,''))));
}

function isNumericColFiltered(idx) {
  return filtered.slice(0,20).filter(r => r[idx] !== undefined && r[idx] !== '')
    .every(r => !isNaN(parseFloat(r[idx].replace(/[$,%]/g,''))));
}

function computeAllAverages() {
  colAverages = {};
  headers.forEach((_, i) => {
    if (!isNumericColAll(i)) return;
    const vals = allRows.map(r => parseFloat((r[i]||'').replace(/[$,%]/g,''))).filter(v => !isNaN(v));
    if (vals.length) colAverages[i] = vals.reduce((a,b)=>a+b,0)/vals.length;
  });
}

function computeTop10(colIdx) {
  if (colIdx < 0) { top10Indices = new Set(); return; }
  const pairs = filtered.map((r, i) => ({ i, v: parseFloat((r[colIdx]||'').replace(/[$,%]/g,'')) }))
    .filter(p => !isNaN(p.v)).sort((a,b) => b.v - a.v);
  top10Indices = new Set(pairs.slice(0,10).map(p=>p.i));
}

function sortByAvgCol() {
  const sel = document.getElementById('avgColSelect');
  avgColIdx = sel.value === '' ? -1 : parseInt(sel.value);
  if (avgColIdx < 0) { top10Indices = new Set(); currentPage = 1; renderTable(); return; }

  filtered.sort((a,b) => {
    const va = parseFloat((a[avgColIdx]||'').replace(/[$,%]/g,'')) || 0;
    const vb = parseFloat((b[avgColIdx]||'').replace(/[$,%]/g,'')) || 0;
    return vb - va;
  });

  document.querySelectorAll('#thead th').forEach(th => th.className = '');
  sortCol = avgColIdx; sortDir = -1;

  computeTop10(avgColIdx);
  currentPage = 1;
  renderTable();
}

function buildHeader() {
  const tr = document.createElement('tr');
  headers.forEach((h, i) => {
    const th = document.createElement('th');
    th.innerHTML = `${h}<span class="sort-arrow"></span>`;
    th.dataset.col = i;
    th.onclick = () => sortBy(i);
    tr.appendChild(th);
  });
  document.getElementById('thead').innerHTML = '';
  document.getElementById('thead').appendChild(tr);
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  const numeric = isNumericColFiltered(col);
  filtered.sort((a, b) => {
    let va = a[col]||'', vb = b[col]||'';
    if (numeric) { va = parseFloat(va.replace(/[$,%]/g,''))||0; vb = parseFloat(vb.replace(/[$,%]/g,''))||0; }
    return va < vb ? -sortDir : va > vb ? sortDir : 0;
  });
  document.querySelectorAll('#thead th').forEach((th, i) => {
    th.className = i === col ? (sortDir === 1 ? 'asc' : 'desc') : '';
  });
  if (avgColIdx >= 0) computeTop10(avgColIdx);
  currentPage = 1;
  renderTable();
}

function applyFilters() {
  const global = document.getElementById('searchInput').value.toLowerCase();
  const colIdx = document.getElementById('colFilter').value;
  const colVal = document.getElementById('colSearch').value.toLowerCase();

  filtered = allRows.filter(row => {
    const gMatch = !global || row.some(c => (c||'').toLowerCase().includes(global));
    const cMatch = colIdx === '' || colVal === '' || (row[colIdx]||'').toLowerCase().includes(colVal);
    return gMatch && cMatch;
  });

  if (sortCol >= 0) {
    const numeric = isNumericColFiltered(sortCol);
    filtered.sort((a, b) => {
      let va = a[sortCol]||'', vb = b[sortCol]||'';
      if (numeric) { va = parseFloat(va.replace(/[$,%]/g,''))||0; vb = parseFloat(vb.replace(/[$,%]/g,''))||0; }
      return va < vb ? -sortDir : va > vb ? sortDir : 0;
    });
  }

  if (avgColIdx >= 0) computeTop10(avgColIdx);
  currentPage = 1;
  renderTable();
}

function formatNum(n) {
  if (Math.abs(n) >= 1000) return n.toLocaleString(undefined, {maximumFractionDigits:2});
  return n.toLocaleString(undefined, {maximumFractionDigits:4});
}

function renderTable() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);
  const numCols = headers.map((_,i) => isNumericColFiltered(i));

  document.getElementById('s-showing').textContent = filtered.length.toLocaleString();
  document.getElementById('match-count').textContent =
    filtered.length !== allRows.length ? `${filtered.length} of ${allRows.length} rows` : `${allRows.length} rows`;

  const tbody = document.getElementById('tbody');

  if (!filtered.length) {
    tbody.innerHTML = '';
    document.getElementById('no-data').style.display = 'block';
    document.getElementById('pagination').style.display = 'none';
    return;
  }
  document.getElementById('no-data').style.display = 'none';

  const rankMap = {};
  if (avgColIdx >= 0) {
    const pairs = filtered.map((r,i) => ({i, v: parseFloat((r[avgColIdx]||'').replace(/[$,%]/g,''))}))
      .filter(p => !isNaN(p.v)).sort((a,b)=>b.v-a.v);
    pairs.slice(0,10).forEach((p,rank) => { rankMap[p.i] = rank+1; });
  }

  let avgRowHtml = '';
  if (avgColIdx >= 0) {
    const avgCells = headers.map((_,i) => {
      if (i === avgColIdx && colAverages[i] !== undefined)
        return `<td class="numeric">${formatNum(colAverages[i])}</td>`;
      if (numCols[i] && colAverages[i] !== undefined)
        return `<td class="numeric" style="opacity:0.5;font-size:11px">${formatNum(colAverages[i])}</td>`;
      return `<td></td>`;
    }).join('');
    avgRowHtml = `<tr class="avg-row">${avgCells}</tr>`;
  }

  const rowsHtml = slice.map((row, sliceIdx) => {
    const filteredIdx = start + sliceIdx;
    const isTop = top10Indices.has(filteredIdx);
    const rank = rankMap[filteredIdx];
    const rowClass = isTop ? 'top10' : '';
    const cells = headers.map((_, i) => {
      let cls = numCols[i] ? 'numeric' : '';
      let extra = '';
      if (isTop && i === 0) { cls += ' rank-badge'; extra = `data-rank="#${rank}"`; }
      return `<td class="${cls}" ${extra} title="${(row[i]||'').replace(/"/g,'&quot;')}">${row[i]||''}</td>`;
    }).join('');
    return `<tr class="${rowClass}">${cells}</tr>`;
  }).join('');

  tbody.innerHTML = avgRowHtml + rowsHtml;
  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  const pg = document.getElementById('pagination');
  if (total <= 1) { pg.style.display = 'none'; return; }
  pg.style.display = 'flex';
  let html = '';
  const addBtn = (label, page, active=false, disabled=false) => {
    html += `<button class="page-btn${active?' active':''}" ${disabled?'disabled':''} onclick="goPage(${page})">${label}</button>`;
  };
  addBtn('«',1,false,currentPage===1);
  addBtn('‹',currentPage-1,false,currentPage===1);
  let pages = new Set([1,total,currentPage-1,currentPage,currentPage+1].filter(p=>p>=1&&p<=total));
  let prev=0;
  [...pages].sort((a,b)=>a-b).forEach(p=>{
    if(prev&&p-prev>1) html+=`<span class="page-info">…</span>`;
    addBtn(p,p,p===currentPage); prev=p;
  });
  addBtn('›',currentPage+1,false,currentPage===total);
  addBtn('»',total,false,currentPage===total);
  html+=`<span class="page-info">${currentPage} / ${total}</span>`;
  pg.innerHTML=html;
}

function goPage(p) { currentPage=p; renderTable(); }

function resetAll() {
  allRows=[]; headers=[]; filtered=[];
  sortCol=-1; sortDir=1; currentPage=1; avgColIdx=-1;
  top10Indices=new Set(); colAverages={};
  document.getElementById('dropzone').style.display='block';
  document.getElementById('table-section').style.display='none';
  document.getElementById('statsbar').style.display='none';
  document.getElementById('legend').style.display='none';
  document.getElementById('reset-btn').style.display='none';
  document.getElementById('file-badge').style.display='none';
  document.getElementById('searchInput').value='';
  document.getElementById('colFilter').innerHTML='<option value="">Filter column…</option>';
  document.getElementById('colSearch').value='';
  document.getElementById('fileInput').value='';
  document.getElementById('avgColSelect').innerHTML='<option value="">— pick column —</option>';
}

const dz = document.getElementById('dropzone');
dz.addEventListener('dragover', e=>{e.preventDefault();dz.classList.add('drag-over');});
dz.addEventListener('dragleave', ()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop', e=>{
  e.preventDefault(); dz.classList.remove('drag-over');
  const file=e.dataTransfer.files[0];
  if(file&&file.name.endsWith('.csv')) handleFile(file);
});
</script>
</body>
</html>
